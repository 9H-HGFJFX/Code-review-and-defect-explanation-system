spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:code_audit;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  data:
    redis:
      # 故意指向不可达地址，RedisConfig 里的 NoOp RedisTemplate 会接管
      host: 127.0.0.1
      port: 16379
      timeout: 100
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-h2.sql
      continue-on-error: false
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    com.codeaudit: DEBUG
    org.springframework.security: WARN
    com.baomidou.mybatisplus: WARN

code-audit:
  max-lines: 500
  sync-max-lines: 500
  async-max-lines: 5000
  review-timeout-ms: 30000
  review-pool-size: 10

minimax:
  enabled: false
