server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: code-review-system

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/code_review?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # MyBatis-Plus配置
  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.codereview.entity
    global-config:
      db-config:
        id-type: auto
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForCodeReviewSystemJwtTokenGeneration2024}
  # Access Token有效期（秒）
  access-token-expiration: 7200
  # Refresh Token有效期（秒）
  refresh-token-expiration: 604800

# 限流配置
rate-limit:
  # 未登录用户限制（每分钟）
  anonymous-limit: 100
  # 已登录用户限制（每分钟）
  authenticated-limit: 1000
  # 关键写操作限制（每分钟）
  write-operation-limit: 100

# CORS配置
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
  max-age: 3600
  credentials: true

# 日志配置
logging:
  level:
    root: INFO
    com.codereview: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
