# 代码审查系统研发协作天团 — 团队工作计划
# 项目根目录：E:\Desktop\version

version: 1
plan:
  name: '代码审查系统概要设计说明书协作编写'
  description: '7人团队并行编写《概要设计说明书》，Leader统筹+5Worker分工+Verifier对抗校验'
  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 20
  auto_reject_retries: 2
  verifier_config:
    default_verifiers: [codesystem-verifier]
    audit_sample_rate: 0.0

tasks:
  # ── 阶段1：Leader 初始化 ──────────────────────────────────────
  - id: leader-init
    title: 'Leader初始化：扫描工作区、确认文档状态'
    prompt: |
      立即扫描 E:\Desktop\version 目录：
      1. 列出所有文件（含子目录）
      2. 检查是否存在《概要设计说明书.docx》
      3. 检查是否存在 E:\Desktop\version\outputs 目录

      若 docx 已存在：读取其内容，提取目录结构，通知所有Worker已有点内容
      若 docx 不存在：宣布项目为空，5个Worker并行启动从零编写

      无论哪种情况，完成扫描后立即并行分发任务给5个Worker
      使用 mavis communication send 向各Worker发消息告知任务开始
    assigned_to: codesystem-leader
    verified_by: codesystem-verifier
    verify_prompt: |
      确认 leader-init 任务已完成：
      1. 检查 E:\Desktop\version 目录状态已确认
      2. 若有docx，确认目录结构已提取
      3. 5个Worker已收到任务分发通知
      读取 E:\Desktop\version\.mavis\scratchpads 中的协调状态确认

  # ── 阶段2：5个Worker并行编写各自章节 ──────────────────────────
  - id: worker1-arch
    title: 'Worker1：编写引言+架构设计章节'
    prompt: |
      你负责编写《概要设计说明书》的引言和架构设计章节。

      ## 必须覆盖的内容

      ### 第1章 引言
      - 1.1 背景（代码审查系统在学校/团队中的价值）
      - 1.2 目标（自动化代码质量检测、安全漏洞发现）
      - 1.3 范围（支持语言、技术栈边界）
      - 1.4 术语表（AST、污点分析、RBAC等）

      ### 第2章 架构设计
      - 2.1 系统分层架构（前端层 / BFF层 / 业务服务层 / 审查引擎层 / 数据层）
      - 2.2 技术选型（Java+Spring Boot / Python Flask / Node.js 对比，选定Java）
      - 2.3 部署架构（Docker容器化 + MySQL + Redis）
      - 2.4 设计原则（无状态服务 / 规则可配置 / 引擎隔离）

      ## 输出路径
      将完整章节内容写入：E:\Desktop\version\outputs\worker1-arch.md
      格式：标准Markdown，## 一级标题，### 二级标题，表格用于字段说明

      ## 禁止事项
      - 不得写入任何业务代码
      - 不得修改其他章节内容
      - 仅限操作 worker1-arch.md 文件

      完成编写后通知 codesystem-leader
    assigned_to: codesystem-arch
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 worker1-arch.md：
      1. 确认第1章（引言）和第2章（架构设计）内容完整
      2. 确认术语表包含 AST/污点分析/RBAC 定义
      3. 确认技术选型有明确结论（选Java）
      4. 确认部署架构描述了Docker+MySQL+Redis
      5. 无与其他章节矛盾的内容
      读取 E:\Desktop\version\outputs\worker1-arch.md 进行验证

  - id: worker2-module
    title: 'Worker2：编写模块设计章节（第3章）'
    prompt: |
      你负责编写《概要设计说明书》的模块设计章节（第3章）。

      ## 必须覆盖的内容

      ### 第3章 模块设计
      定义7大核心模块及其职责：

      1. **提交管理模块**（Submission Service）
         - 接收代码提交（Git Hook / API）
         - 支持 zip/tar.gz/单文件上传
         - 存储原始代码到临时目录
         - 触发审查任务队列

      2. **代码解析模块**（Parser Service）
         - 多语言支持（Java/Python/JS/Go）
         - AST生成（基于 ANTLR/Javalin parser）
         - 提取函数/类/变量信息
         - 输出中间表示（IR）

      3. **规则引擎模块**（Rule Engine）
         - 规则注册表（Rule Registry）
         - 规则匹配器（Rule Matcher）
         - 优先级队列（Priority Queue）
         - 规则热更新（无需重启）

      4. **缺陷检测模块**（Issue Detector）
         - 内置规则集（空指针/SQL注入/XSS/硬编码密码）
         - 自定义规则支持（YAML配置）
         - 污点分析（Taint Analysis）
         - 数据流追踪

      5. **报告生成模块**（Report Generator）
         - HTML/PDF/JSON多格式
         - 按文件/按缺陷类型/按人分组
         - 支持导出到飞书文档

      6. **权限管理模块**（Auth Module）
         - RBAC三级权限
         - JWT Token验证
         - 班级数据隔离

      7. **调度管理模块**（Scheduler）
         - 扫描任务队列（Redis Queue）
         - 并发数控制（最大10个并行）
         - 超时保护（单文件5分钟超时）
         - 失败重试（最多3次）

      ## 输出路径
      写入：E:\Desktop\version\outputs\worker2-module.md
      格式：每个模块用 ## 二级标题，含功能描述、核心接口、边界约束

      ## 禁止事项
      - 不写入数据库设计
      - 不写入接口定义
      - 仅限操作 worker2-module.md

      完成编写后通知 codesystem-leader
    assigned_to: codesystem-module
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 worker2-module.md：
      1. 确认7大模块全部定义，职责清晰
      2. 确认规则引擎描述了热更新机制
      3. 确认污点分析模块有数据流追踪描述
      4. 确认调度模块有超时保护（5分钟/文件）
      5. 无与架构章节矛盾的分层设计
      读取 E:\Desktop\version\outputs\worker2-module.md 进行验证

  - id: worker3-database
    title: 'Worker3：编写数据库设计章节（第4章）'
    prompt: |
      你负责编写《概要设计说明书》的数据库设计章节（第4章）。

      ## 必须覆盖的6张核心表

      ### 4.1 ER图（文字描述）
      描述实体关系：
      - User 1:N ReviewTask（一个用户可创建多个任务）
      - User N:N Class（用户通过class_user多对多关联）
      - ReviewTask 1:N Issue（一个任务可发现多个缺陷）
      - Class 1:N ReviewTask（一个班级内可发起审查任务）

      ### 4.2 user表
      ```sql
      CREATE TABLE `user` (
        `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
        `username` VARCHAR(64) NOT NULL UNIQUE COMMENT '用户名',
        `email` VARCHAR(255) NOT NULL UNIQUE COMMENT '邮箱',
        `password_hash` VARCHAR(255) NOT NULL COMMENT '密码哈希',
        `role` TINYINT NOT NULL DEFAULT 3 COMMENT '角色:1=超管,2=教师,3=学生',
        `class_id` BIGINT COMMENT '所属班级ID',
        `is_deleted` TINYINT DEFAULT 0 COMMENT '逻辑删除',
        `created_at` DATETIME DEFAULT CURRENT_TIMESTAMP,
        `updated_at` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
      );
      ```

      ### 4.3 review_task表
      ```sql
      CREATE TABLE `review_task` (
        `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
        `title` VARCHAR(255) NOT NULL COMMENT '任务标题',
        `status` TINYINT DEFAULT 0 COMMENT '状态:0=创建,1=扫描中,2=完成,3=失败',
        `submitter_id` BIGINT NOT NULL COMMENT '提交人ID',
        `reviewer_id` BIGINT COMMENT '审核人ID(教师)',
        `class_id` BIGINT NOT NULL COMMENT '所属班级ID',
        `rule_set` VARCHAR(255) DEFAULT 'default' COMMENT '启用的规则集',
        `source_path` VARCHAR(500) COMMENT '源码路径',
        `result_summary` JSON COMMENT '扫描结果摘要',
        `created_at` DATETIME DEFAULT CURRENT_TIMESTAMP,
        `updated_at` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
      );
      ```

      ### 4.4 issue表
      ```sql
      CREATE TABLE `issue` (
        `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
        `task_id` BIGINT NOT NULL COMMENT '关联任务ID',
        `severity` TINYINT NOT NULL COMMENT '严重程度:1=严重,2=高,3=中,4=低',
        `category` VARCHAR(64) NOT NULL COMMENT '缺陷分类',
        `file_path` VARCHAR(500) NOT NULL COMMENT '文件路径',
        `line_number` INT COMMENT '行号',
        `description` TEXT COMMENT '缺陷描述',
        `suggestion` TEXT COMMENT '修复建议',
        `status` TINYINT DEFAULT 0 COMMENT '状态:0=未处理,1=已分配,2=已修复,3=已关闭',
        `assignee_id` BIGINT COMMENT '分配给谁',
        `created_at` DATETIME DEFAULT CURRENT_TIMESTAMP
      );
      ```

      ### 4.5 rule表
      ```sql
      CREATE TABLE `rule` (
        `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
        `name` VARCHAR(128) NOT NULL UNIQUE COMMENT '规则名称',
        `category` TINYINT NOT NULL COMMENT '分类:1=风格,2=安全,3=性能,4=最佳实践,5=正确性',
        `severity` TINYINT NOT NULL COMMENT '对应严重程度',
        `pattern` TEXT COMMENT '匹配模式(JSON)',
        `message` VARCHAR(500) COMMENT '提示信息',
        `enabled` TINYINT DEFAULT 1 COMMENT '是否启用',
        `version` INT DEFAULT 1 COMMENT '版本号',
        `created_at` DATETIME DEFAULT CURRENT_TIMESTAMP,
        `updated_at` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
      );
      ```

      ### 4.6 class表和class_user表
      ```sql
      CREATE TABLE `class` (
        `id` BIGINT PRIMARY KEY AUTO_INCREMENT,
        `name` VARCHAR(128) NOT NULL COMMENT '班级名称',
        `teacher_id` BIGINT NOT NULL COMMENT '班主任ID',
        `description` TEXT COMMENT '班级描述',
        `created_at` DATETIME DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE `class_user` (
        `class_id` BIGINT NOT NULL,
        `user_id` BIGINT NOT NULL,
        `role_in_class` TINYINT DEFAULT 3 COMMENT '班级内角色:2=教师,3=学生',
        `joined_at` DATETIME DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (`class_id`, `user_id`)
      );
      ```

      ### 4.7 索引设计
      - user表：idx_role（role字段）、idx_class_id（class_id字段）
      - review_task表：idx_class_id（class_id）、idx_status（status）、idx_submitter（submitter_id）
      - issue表：idx_task_id（task_id）、idx_status（status）、idx_assignee（assignee_id）
      - rule表：idx_enabled（enabled）、idx_category（category）

      ## 输出路径
      写入：E:\Desktop\version\outputs\worker3-database.md
      格式：ER图描述 + 建表SQL + 字段说明表 + 索引说明表

      ## 禁止事项
      - 不写入引言/架构/模块内容
      - 不写入接口定义
      - 仅限操作 worker3-database.md

      完成编写后通知 codesystem-leader
    assigned_to: codesystem-db
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 worker3-database.md：
      1. 确认6张表（user/review_task/issue/rule/class/class_user）建表SQL完整
      2. 确认枚举值：role(1/2/3)、severity(1/2/3/4)、status各表枚举值一致
      3. 确认索引设计合理（无遗漏必要索引）
      4. 确认class_user多对多表结构正确
      5. 确认逻辑删除字段（is_deleted）存在
      读取 E:\Desktop\version\outputs\worker3-database.md 进行验证

  - id: worker4-api
    title: 'Worker4：编写接口设计+安全设计章节（第5-6章）'
    prompt: |
      你负责编写《概要设计说明书》的接口设计（第5章）和安全设计（第6章）。

      ## 必须覆盖的内容

      ### 第5章 接口设计

      #### 5.1 接口规范
      - RESTful规范（资源命名 / HTTP方法语义 / 路径参数vs查询参数）
      - 统一返回格式：
        ```json
        {
          "code": 0,
          "message": "success",
          "data": {}
        }
        ```
      - 错误码体系：
        - 1000-1999：认证授权类
        - 2000-2999：审查任务类
        - 3000-3999：缺陷管理类
        - 4000-4999：规则管理类
        - 9000-9999：系统类

      #### 5.2 接口清单（必须覆盖以下所有接口）

      **认证接口**
      | 方法 | 路径 | 描述 | 权限 |
      |------|------|------|------|
      | POST | /api/auth/login | 登录 | 公开 |
      | POST | /api/auth/refresh | 刷新Token | 已登录 |
      | POST | /api/auth/logout | 登出 | 已登录 |

      **审查任务接口**
      | 方法 | 路径 | 描述 | 权限 |
      |------|------|------|------|
      | POST | /api/tasks | 创建任务 | 教师/管理员 |
      | GET | /api/tasks | 任务列表（分页+班级过滤） | 已登录 |
      | GET | /api/tasks/{id} | 任务详情 | 任务参与者 |
      | PUT | /api/tasks/{id}/status | 更新状态 | 教师 |
      | DELETE | /api/tasks/{id} | 删除任务 | 管理员 |

      **缺陷接口**
      | 方法 | 路径 | 描述 | 权限 |
      |------|------|------|------|
      | GET | /api/tasks/{id}/issues | 获取缺陷列表 | 任务参与者 |
      | POST | /api/issues/{id}/assign | 分配缺陷 | 教师 |
      | PUT | /api/issues/{id}/status | 更新状态 | 教师/缺陷负责人 |

      **规则接口**
      | 方法 | 路径 | 描述 | 权限 |
      |------|------|------|------|
      | GET | /api/rules | 获取规则列表 | 已登录 |
      | POST | /api/rules | 创建规则 | 管理员 |
      | PUT | /api/rules/{id} | 更新规则 | 管理员 |
      | PUT | /api/rules/{id}/enable | 启用/禁用 | 管理员 |

      ### 第6章 安全设计

      #### 6.1 权限模型（RBAC三级）
      - 超级管理员（SUPER_ADMIN=1）：系统级管理，不可操作具体班级数据
      - 教师（TEACHER=2）：管理自己的班级，创建审查任务，分配缺陷
      - 学生（STUDENT=3）：提交代码，查看自己的缺陷

      #### 6.2 数据隔离规则
      - 学生只能看到自己班级的数据（class_id隔离）
      - 教师只能管理自己创建的班级
      - 所有查询必须附加 class_id 过滤条件
      - SQL查询必须参数化，防止注入

      #### 6.3 JWT认证
      - Access Token有效期：2小时
      - Refresh Token有效期：7天
      - Token结构：userId + role + classId + exp + issuedAt
      - 黑名单机制：登出时加入黑名单

      #### 6.4 接口安全
      - 请求频率限制：未登录100次/分钟，已登录1000次/分钟
      - CORS白名单配置
      - 敏感数据脱敏（手机号中间4位，邮箱@后隐藏）
      - 引擎沙箱隔离（代码执行在独立容器，有内存限制2GB，有超时5分钟）

      ## 输出路径
      写入：E:\Desktop\version\outputs\worker4-api.md
      格式：接口文档表 + 安全设计说明 + 权限矩阵表

      ## 禁止事项
      - 不写入数据库建表语句
      - 不写入性能指标数值
      - 仅限操作 worker4-api.md

      完成编写后通知 codesystem-leader
    assigned_to: codesystem-api
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 worker4-api.md：
      1. 确认所有接口（认证/任务/缺陷/规则）均有定义
      2. 确认RBAC三级权限矩阵完整（超级管理员/教师/学生）
      3. 确认错误码体系按模块分配
      4. 确认数据隔离逻辑无越权漏洞
      5. 确认JWT Token有效期配置合理
      6. 确认接口限流和沙箱安全描述
      读取 E:\Desktop\version\outputs\worker4-api.md 进行验证

  - id: worker5-ops
    title: 'Worker5：编写异常处理+性能优化+运维部署+未实现需求章节（第7-10章）'
    prompt: |
      你负责编写《概要设计说明书》第7-10章（异常处理/性能优化/运维部署/未实现需求）。

      ## 必须覆盖的内容

      ### 第7章 异常处理

      #### 7.1 全局异常分类
      | 异常类型 | 错误码范围 | HTTP状态码 | 说明 |
      |---------|-----------|-----------|------|
      | BusinessException | 1001-1999 | 400 | 业务校验失败 |
      | UnauthorizedException | 1000 | 401 | 未认证 |
      | ForbiddenException | 1002 | 403 | 无权限 |
      | ResourceNotFoundException | 1003 | 404 | 资源不存在 |
      | CircuitBreakerException | 9001 | 503 | 熔断触发 |
      | ExternalServiceException | 9002 | 502 | 外部服务超时 |
      | StorageException | 9003 | 500 | 文件存储失败 |
      | ScanTimeoutException | 9004 | 504 | 代码扫描超时 |

      #### 7.2 统一异常处理
      - Controller层统一拦截 @ControllerAdvice
      - 全局错误码转换
      - 日志记录（ERROR级别，含请求ID）
      - 敏感信息不返回给前端

      ### 第8章 性能优化

      #### 8.1 线程池隔离
      - 扫描任务池（core=5, max=10, queue=100）
      - 接口任务池（core=10, max=20, queue=500）
      - 规则编译池（core=2, max=4, 线程隔离）

      #### 8.2 缓存策略
      - 热点规则缓存（Redis，TTL=1小时）
      - AST缓存（本地LRU，max=1000个文件）
      - 审查结果缓存（Redis，TTL=24小时）
      - 用户Token缓存（Redis，TTL=2小时）

      #### 8.3 性能指标
      - 单文件扫描 < 5秒（文件<1MB）
      - 100文件项目扫描 < 60秒
      - 接口响应时间 P99 < 500ms
      - 并发扫描任务数上限：10

      ### 第9章 运维部署

      #### 9.1 Docker部署
      ```dockerfile
      # 多阶段构建
      FROM eclipse-temurin:17-jre-alpine AS runtime
      WORKDIR /app
      COPY target/app.jar /app/
      ENV JAVA_OPTS="-Xms512m -Xmx2g -XX:+UseG1GC"
      EXPOSE 8080
      ENTRYPOINT ["sh", "-c", "java $JAVA_OPTS -jar app.jar"]
      ```

      #### 9.2 docker-compose.yml
      - 应用服务（端口8080）
      - MySQL 8.0（端口3306，字符集utf8mb4）
      - Redis 7.0（端口6379）
      - Prometheus（端口9090，可选）

      #### 9.3 版本回滚
      - 每次部署打镜像标签（v1.0.0, v1.0.1...）
      - 保留最近5个版本镜像
      - 回滚命令：docker-compose down && docker-compose pull && docker-compose up -d

      #### 9.4 监控
      - Prometheus metrics端点：/actuator/prometheus
      - 健康检查：/actuator/health
      - 关键指标：扫描任务队列长度 / 平均扫描时长 / 错误率

      ### 第10章 未实现需求

      记录以下功能的规划说明（不需要实现，仅文档规划）：
      1. Webhook通知（任务完成时通知钉钉/飞书）
      2. GitLab/GitHub集成（PR级别自动审查）
      3. 自定义规则SDK（支持用户编写Java规则插件）
      4. 多语言深度扫描（Rust/C++代码分析）
      5. AI辅助修复建议（GPT-4驱动，敏感代码不上传）

      ## 输出路径
      写入：E:\Desktop\version\outputs\worker5-ops.md
      格式：各章节Markdown，含关键配置示例代码

      ## 禁止事项
      - 不写入接口详细定义
      - 不写入数据库建表语句
      - 仅限操作 worker5-ops.md

      完成编写后通知 codesystem-leader
    assigned_to: codesystem-ops
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 worker5-ops.md：
      1. 确认8种异常类型全部定义，错误码不冲突
      2. 确认线程池隔离策略描述清晰
      3. 确认性能指标数值合理（单文件<5s, 100文件<60s）
      4. 确认Docker多阶段构建描述正确
      5. 确认docker-compose包含MySQL+Redis+应用
      6. 确认版本回滚策略完整
      7. 确认未实现需求清单≥5项
      读取 E:\Desktop\version\outputs\worker5-ops.md 进行验证

  # ── 阶段3：Verifier 对抗校验（并行Gate，Worker完成后自动触发） ──
  - id: verifier-review
    title: 'Verifier：全文对抗校验'
    prompt: |
      你是对抗式验收校验专家。等待所有5个Worker完成章节编写后，执行全面校验。

      ## 校验范围
      读取以下所有文件：
      - E:\Desktop\version\outputs\worker1-arch.md
      - E:\Desktop\version\outputs\worker2-module.md
      - E:\Desktop\version\outputs\worker3-database.md
      - E:\Desktop\version\outputs\worker4-api.md
      - E:\Desktop\version\outputs\worker5-ops.md

      ## 必须逐项检查（共5大类）

      ### ① 枚举值全局统一性
      全文枚举必须完全一致：
      - 角色：SUPER_ADMIN=1, TEACHER=2, STUDENT=3
      - 缺陷等级：CRITICAL=1, HIGH=2, MEDIUM=3, LOW=4
      - 任务状态：CREATED=0, SCANNING=1, COMPLETED=2, FAILED=3
      - 规则分类：STYLE=1, SECURITY=2, PERFORMANCE=3, BEST_PRACTICE=4, CORRECTNESS=5
      - 缺陷状态：UNASSIGNED=0, ASSIGNED=1, RESOLVED=2, CLOSED=3

      列出任何不一致之处，给出推荐修正值。

      ### ② 架构/模块/接口/数据库逻辑无矛盾
      - 接口参数与数据库字段是否匹配（userId vs user_id 命名风格）
      - 模块间依赖是否有循环
      - 接口权限标记与RBAC矩阵是否一致

      ### ③ 文档格式规范
      - 字段说明表格式统一
      - HTTP状态码合理（4xx/5xx区分）
      - 错误码按模块分配不重叠
      - 边界约束完整

      ### ④ 安全权限无越权漏洞
      - 学生接口是否错误允许访问其他班级数据
      - 所有查询是否都有 class_id 过滤
      - JWT Token校验是否存在绕过风险
      - SQL注入风险点识别

      ### ⑤ 审查引擎流程健壮性
      - 是否有超时机制（防止OOM/死循环）
      - 大文件扫描的内存保护
      - 规则加载失败的降级策略
      - AST解析异常的兜底方案

      ## 输出要求
      写入：E:\Desktop\version\outputs\verifier-report.md
      格式：
      ## 校验结论：PASS（全部通过）/ FAIL（存在问题）
      ## 枚举值对照表（所有枚举类型）
      ## 问题清单（如有FAIL项）
      ## 安全风险列表
      ## 超时/OOM风险分析

      将完整报告通知 codesystem-leader 并标记任务完成。
    assigned_to: codesystem-verifier
    depends_on: [worker1-arch, worker2-module, worker3-database, worker4-api, worker5-ops]
    verified_by: codesystem-verifier
    verify_prompt: |
      对抗复验 verifier-report.md：
      1. 读取 E:\Desktop\version\outputs\verifier-report.md
      2. 重新逐项检查5大类校验项，不依赖 verifier 自己写的结论
      3. 独立推导枚举值对照表，与报告中的对比是否一致
      4. 若发现 verifier 漏检的问题，直接标记为 FAIL 并列出
      5. 若全部通过，标记为 PASS

  # ── 阶段4：Leader 合并定稿 ──────────────────────────────────
  - id: leader-merge
    title: 'Leader：合并全部章节输出完整文档'
    prompt: |
      所有Worker已完成编写，Verifier校验完成。现在执行最终合并。

      ## 执行步骤

      1. **读取所有Worker输出**
         - E:\Desktop\version\outputs\worker1-arch.md
         - E:\Desktop\version\outputs\worker2-module.md
         - E:\Desktop\version\outputs\worker3-database.md
         - E:\Desktop\version\outputs\worker4-api.md
         - E:\Desktop\version\outputs\worker5-ops.md

      2. **读取Verifier报告**（判断是否可以合并）
         - E:\Desktop\version\outputs\verifier-report.md
         - 若有 FAIL 项，报告给用户说明问题，不执行合并，等待用户指令
         - 若全部 PASS，执行合并

      3. **合并生成完整Markdown**
         按以下目录结构合并：
         ```
