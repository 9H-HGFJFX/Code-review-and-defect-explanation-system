         ```

      4. **写入完整文档**
         - E:\Desktop\version\概要设计说明书-合并版.md（Markdown，便于查看）
         - 最终输出标注各章节来源

      5. **报告完成**
         向用户报告：
         - 文档共10章 + 2个附录
         - 各章节来源
         - 如有遗留问题，列出并说明

      注意：你是合并者，不是编写者。不要自己创造内容，只合并Worker提供的输出。
    assigned_to: codesystem-leader
    depends_on: [verifier-review]
    verified_by: codesystem-verifier
    verify_prompt: |
      校验 leader-merge 输出的完整文档：
      1. 读取 E:\Desktop\version\概要设计说明书-合并版.md
      2. 确认共10章 + 2个附录，章节编号连续
      3. 确认每章内容来自对应Worker输出，无遗漏章节
      4. 确认枚举值全文统一（role/severity/status/category）
      5. 确认文档格式一致（表格/标题/代码块风格）
      6. 若发现遗漏章节或内容冲突，标记 FAIL 并指出具体问题
