version: 1
plan:
  name: 代码审查系统实际实现
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 20
  auto_reject_retries: 2
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0

tasks:
  - id: track-a-scaffold
    title: Track A - 项目脚手架 + 数据库层
    prompt: |
      在 E:\Desktop\version 目录下，基于设计文档实现代码审查系统的项目脚手架和数据库层。

      ## 设计文档参考
      - E:\Desktop\version\outputs\worker1-arch.md（架构设计）
      - E:\Desktop\version\outputs\worker3-database.md（数据库设计）
      - E:\Desktop\version\outputs\worker5-ops.md（异常处理和健壮性策略）

      ## 技术栈
      - Java 17 + Spring Boot 3.2.x
      - MyBatis-Plus 3.5.x
      - MySQL 8.0 + Redis 7
      - Maven 3.9.x
      - Docker + docker-compose

      ## 必须完成的内容

      ### 1. Maven项目结构
      创建标准Spring Boot Maven项目目录：
      ```
      E:\Desktop\version\
      ├── pom.xml
      └── src/main/
          ├── java/com/codereview/
          │   ├── CodeReviewApplication.java
          │   ├── config/
          │   │   ├── AppConfig.java
          │   │   └── YamlPropertySourceFactory.java
          │   ├── entity/         （MyBatis-Plus实体）
          │   ├── repository/     （MyBatis-Plus Mapper）
          │   ├── service/        （服务层接口+实现）
          │   ├── controller/     （REST控制器）
          │   ├── engine/         （审查引擎）
          │   │   ├── parser/     （代码解析器）
          │   │   ├── rule/       （规则引擎）
          │   │   └── detector/   （缺陷检测器）
          │   ├── scheduler/      （调度管理）
          │   ├── common/
          │   │   ├── exception/  （全局异常）
          │   │   ├── result/     （统一响应）
          │   │   └── enums/      （枚举类）
          │   └── util/
          └── resources/
              ├── application.yml
              ├── application-dev.yml
              └── application-prod.yml
      ```

      ### 2. pom.xml（完整依赖）
      必须包含：
      - spring-boot-starter-web (3.2.x)
      - spring-boot-starter-data-redis
      - mybatis-plus-spring-boot-starter (3.5.x)
      - mysql-connector-java (8.0.x)
      - spring-boot-starter-security
      - jjwt-api/impl/jackson (0.12.x) - JWT
      - lombok
      - spring-boot-starter-validation
      - spring-boot-starter-aop
      - jackson-databind
      - hutool-all (工具库)
      - eclipse-jdt-core (Java AST解析)
      - antlr4-runtime (4.13.x)
      - pytest (Python) - 通过ProcessBuilder调用
      - docker-compose.yml（MySQL + Redis + 应用）

      ### 3. application.yml 配置
      ```yaml
      spring:
        application:
          name: code-review-system
        profiles:
          active: dev
        datasource:
          url: jdbc:mysql://localhost:3306/code_review?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
          username: root
          password: root
          driver-class-name: com.mysql.cj.jdbc.Driver
        redis:
          host: localhost
          port: 6379
      mybatis-plus:
        mapper-locations: classpath*:/mapper/**/*.xml
        type-aliases-package: com.codereview.entity
        configuration:
          map-underscore-to-camel-case: true
          log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
      jwt:
        secret: codeReviewSecretKey2026MustBeAtLeast256BitsLong!!
        access-token-validity: 7200
        refresh-token-validity: 604800
      ```

      ### 4. 枚举类（com.codereview.common.enums）
      按设计文档创建以下枚举，全部使用整数值存储：
      - UserRole: SUPER_ADMIN(1), TEACHER(2), STUDENT(3)
      - TaskStatus: PENDING(0), IN_PROGRESS(1), COMPLETED(2), FAILED(3)
      - IssueStatus: OPEN(0), ASSIGNED(1), RESOLVED(2), CLOSED(3)
      - IssueSeverity: CRITICAL(1), HIGH(2), MEDIUM(3), LOW(4)
      - RuleCategory: STYLE(1), SECURITY(2), PERFORMANCE(3), BEST_PRACTICE(4), CORRECTNESS(5)

      ### 5. 实体类（MyBatis-Plus Entity）
      按设计文档 worker3-database.md 创建6张表的实体：
      1. User.java - 用户表（含role/email/username/password_hash/class_id）
      2. ReviewTask.java - 审查任务表（含status/title/submitter_id/reviewer_id/class_id/rule_set等）
      3. Issue.java - 缺陷表（含task_id/severity/category/file_path/line_number/description/suggestion/status/assignee_id）
      4. Rule.java - 规则表（含name/category/severity/pattern/message/enabled/version）
      5. Class.java - 班级表（含name/teacher_id/description）
      6. ClassUser.java - 班级用户关联表（复合主键class_id+user_id）

      每个实体类要求：
      - 使用Lombok（@Data @TableName @TableId等）
      - 字段名与数据库严格对应（使用MyBatis-Plus自动驼峰映射）
      - 添加中文注释
      - 包含所有外键关联字段

      ### 6. Repository/Mapper接口
      为6个实体创建MyBatis-Plus Mapper接口，继承BaseMapper<T>：
      - UserMapper.java
      - ReviewTaskMapper.java
      - IssueMapper.java
      - RuleMapper.java
      - ClassMapper.java
      - ClassUserMapper.java

      ### 7. 全局统一响应（com.codereview.common.result）
      ```java
      @Data
      public class Result<T> {
          private int code;
          private String message;
          private T data;
          private long timestamp;

          public static <T> Result<T> success(T data) { ... }
          public static <T> Result<T> error(int code, String message) { ... }
      }
      ```

      ### 8. 全局异常处理（com.codereview.common.exception）
      按设计文档 worker4-api.md 和 worker5-ops.md 创建：
      - BaseException.java（基础异常）
      - BusinessException.java（业务异常，错误码1001-1999）
      - UnauthorizedException.java（1000）
      - ForbiddenException.java（1002）
      - ResourceNotFoundException.java（1003）
      - CircuitBreakerException.java（9001）
      - ExternalServiceException.java（9002）
      - StorageException.java（9003）
      - ScanTimeoutException.java（9004）
      - GlobalExceptionHandler.java（@RestControllerAdvice统一处理）

      ### 9. docker-compose.yml
      ```yaml
      services:
        app:
          build: .
          ports: ["8080:8080"]
          environment:
            - SPRING_PROFILES_ACTIVE=prod
            - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/code_review
            - SPRING_DATASOURCE_USERNAME=codereview
            - SPRING_DATASOURCE_PASSWORD=secret
            - SPRING_REDIS_HOST=redis
          depends_on:
            mysql: {condition: service_healthy}
            redis: {condition: service_started}
        mysql:
          image: mysql:8.0
          environment:
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=code_review
            - MYSQL_USER=codereview
            - MYSQL_PASSWORD=secret
          healthcheck:
            test: ["CMD", "mysqladmin", "ping"]
            interval: 10s
            retries: 5
        redis:
          image: redis:7-alpine
          ports: ["6379:6379"]
      ```

      ### 10. Dockerfile
      按 worker5-ops.md 的多阶段构建方式：
      ```dockerfile
      FROM maven:3.9-eclipse-temurin-17 AS builder
      WORKDIR /build
      COPY pom.xml .
      RUN mvn dependency:go-offline
      COPY src ./src
      RUN mvn clean package -DskipTests
      FROM eclipse-temurin:17-jre-alpine
      WORKDIR /app
      COPY --from=builder /build/target/*.jar /app/app.jar
      ENV JAVA_OPTS="-Xms512m -Xmx2g"
      EXPOSE 8080
      ENTRYPOINT ["sh", "-c", "java $JAVA_OPTS -jar /app/app.jar"]
      ```

      ## 交付要求
      - 所有文件写入 E:\Desktop\version 目录
      - pom.xml必须完整可构建（所有依赖版本正确无冲突）
      - application.yml必须包含所有必要的配置项
      - 枚举类必须有整数值映射，与设计文档完全一致
      - 实体类必须与数据库表结构一一对应
      - docker-compose.yml必须完整（MySQL + Redis + 应用）
      - 完成后输出交付物摘要到 E:\Desktop\version\outputs\track-a-scaffold-deliverable.md

    assigned_to: code-agent3-team
    role: produce
    verified_by: verifier
    verify_prompt: |
      验证 Track A 交付物：
      1. 读取 E:\Desktop\version\pom.xml，确认所有依赖版本正确、无冲突
      2. 读取 E:\Desktop\version\src\main\java\com\codereview\common\enums，确认6个枚举类存在且整数值与设计文档一致
      3. 读取6个实体类，确认字段与 worker3-database.md 的表结构完全对应
      4. 读取 application.yml，确认包含所有必要配置（数据源/Redis/JWT/MyBatis-Plus）
      5. 读取 GlobalExceptionHandler.java，确认所有异常类型被正确处理
      6. 读取 docker-compose.yml，确认包含 MySQL + Redis + 应用服务
      7. 读取 Dockerfile，确认多阶段构建正确
      输出 PASS 或 FAIL 及具体问题列表。
    timeout_ms: 1800000

  - id: track-b-core
    title: Track B - 核心业务模块实现
    prompt: |
      在 E:\Desktop\version 目录下，实现代码审查系统的核心业务模块。

      ## 前置要求
      必须先读取 Track A 创建的基础文件（如果 Track A 已完成）：
      - pom.xml（确认依赖）
      - src/main/resources/application.yml（确认配置）
      - 实体类路径：src/main/java/com/codereview/entity/
      - 枚举类路径：src/main/java/com/codereview/common/enums/
      - Repository路径：src/main/java/com/codereview/repository/

      ## 设计文档参考
      - E:\Desktop\version\outputs\worker2-module.md（模块设计，3.2节7大核心模块）
      - E:\Desktop\version\outputs\worker5-ops.md（健壮性兜底策略第7.3节）

      ## 必须完成的内容

      ### 1. 代码解析器（com.codereview.engine.parser）
      **SourceParser.java** - 统一解析入口：
      ```java
      public interface SourceParser {
          // 解析源代码文件，返回AST表示或缺陷列表
          List<Issue> parse(SourceFile file, List<Rule> rules);
      }
      ```

      **JavaParser.java** - Java代码解析（使用Eclipse JDT）：
      ```java
      @Component
      public class JavaParser implements SourceParser {
          // 使用org.eclipse.jdt.core.dom进行AST解析
          // 支持方法提取、变量追踪、类型检查
      }
      ```

      **PythonParser.java** - Python代码解析（使用AST内置库）：
      ```java
      @Component
      public class PythonParser implements SourceParser {
          // 使用Python内置ast模块，通过ProcessBuilder调用python命令
          // 解析后提取函数、类、导入语句
      }
      ```

      **SourceFile.java** - 源代码文件实体：
      ```java
      @Data
      public class SourceFile {
          private String path;
          private String language;  // java/python/javascript
          private String content;
          private byte[] rawContent;
      }
      ```

      ### 2. 规则引擎（com.codereview.engine.rule）
      **RuleEngine.java** - 规则匹配核心：
      ```java
      @Service
      public class RuleEngine {
          // 根据语言类型匹配适用规则
          List<Issue> match(SourceFile file, List<Rule> rules);
          // 单条规则匹配
          Optional<Issue> matchRule(SourceFile file, Rule rule);
      }
      ```

      **RuleLoader.java** - 规则加载器（fail-mode降级策略）：
      ```java
      @Service
      public class RuleLoader {
          // fail-mode=log-and-skip：加载失败跳过并记录ERROR日志
          // fail-mode=strict：加载失败抛出异常
          // fail-mode=warn：加载失败记录WARN并跳过
          RuleLoadResult loadRules(Path rulesDir, FailMode mode);
      }
      ```

      **RuleFactory.java** - 根据category创建不同检测器：
      ```java
      @Component
      public class RuleFactory {
          // SECURITY -> SecurityRuleDetector
          // STYLE -> StyleRuleDetector
          // PERFORMANCE -> PerformanceRuleDetector
          // BEST_PRACTICE -> BestPracticeRuleDetector
          // CORRECTNESS -> CorrectnessRuleDetector
      }
      ```

      **内置规则注册**（数据库seed数据或Java代码）：
      ```java
      // SECURITY规则（检测SQL注入、XSS、硬编码密码等）
      // STYLE规则（过长方法、重复代码、魔法数字等）
      // PERFORMANCE规则（内存泄漏、N+1查询等）
      // BEST_PRACTICE规则（异常处理、日志规范等）
      // CORRECTNESS规则（空指针、类型错误等）
      ```

      ### 3. 缺陷检测器（com.codereview.engine.detector）
      **IssueDetector.java** - 统一检测入口：
      ```java
      @Service
      public class IssueDetector {
          // 单文件检测
          List<Issue> detect(SourceFile file);
          // 批量检测
          ScanResult detectBatch(List<SourceFile> files);
      }
      ```

      **SecurityRuleDetector.java** - 安全规则检测：
      ```java
      // 检测SQL注入：字符串拼接SQL、PreparedStatement误用
      // 检测XSS：未转义的用户输入
      // 检测硬编码密码：password = "xxx"、API_KEY = "xxx"
      // 检测路径遍历：用户输入直接拼接到文件路径
      ```

      **StyleRuleDetector.java** - 风格规则检测：
      ```java
      // 检测过长方法（>200行）
      // 检测重复代码（简单文本相似度）
      // 检测魔法数字（未定义常量的数字字面量）
      ```

      **DetectorResult.java** - 检测结果：
      ```java
      @Data
      public class DetectorResult {
          private List<Issue> issues;
          private List<FailedFileInfo> failedFiles;  // 解析失败的文件
          private ScanStats stats;
      }

      @Data
      public class FailedFileInfo {
          private String filePath;
          private FailureReason reason;  // PARSE_ERROR / TIMEOUT / ENCODING_ERROR
          private String detail;
      }
      ```

      ### 4. 调度管理（com.codereview.scheduler）
      **ScanScheduler.java** - 任务调度：
      ```java
      @Service
      public class ScanScheduler {
          // 基于Redis队列的分布式任务调度
          // 并发控制：最多10个并行扫描任务
          // 超时保护：单文件30秒超时
          // 失败重试：最多3次，指数退避
          void submitScanTask(Long taskId);
          ScanResult executeScan(Long taskId);
      }
      ```

      **ScanTaskQueue.java** - Redis队列管理：
      ```java
      // 使用Redis List实现任务队列
      // LPUSH添加任务，BRPOP阻塞式拉取
      // 队列键：scan:task:queue
      // 任务状态键：scan:task:status:{taskId}
      ```

      **AST解析异常兜底处理**（来自worker5-ops.md第7.3.2节）：
      ```java
      // 单文件解析失败 -> 记录failedFiles -> 继续处理其他文件 -> 返回部分结果
      // 不因单文件失败而中断整个任务
      ```

      ### 5. 服务层（com.codereview.service）
      **ReviewTaskService.java**：
      ```java
      public interface ReviewTaskService {
          Long createTask(CreateTaskDTO dto, Long userId);
          void startScan(Long taskId);
          void updateStatus(Long taskId, TaskStatus status);
          PageResult<TaskVO> listTasks(TaskQueryDTO query, Long userId, UserRole role);
          TaskVO getTaskDetail(Long taskId);
      }
      ```

      **IssueService.java**：
      ```java
      public interface IssueService {
          List<IssueVO> listByTask(Long taskId, IssueQueryDTO query);
          void assignIssue(Long issueId, Long assigneeId);
          void updateStatus(Long issueId, IssueStatus status);
      }
      ```

      **RuleService.java**：
      ```java
      public interface RuleService {
          List<RuleVO> listRules(RuleQueryDTO query);
          void createRule(CreateRuleDTO dto);
          void updateRule(Long id, UpdateRuleDTO dto);
          void toggleRule(Long id, boolean enabled);
      }
      ```

      ### 6. 报告生成（com.codereview.engine.report）
      **ReportGenerator.java**：
      ```java
      @Service
      public class ReportGenerator {
          // 生成HTML报告
          String generateHtml(Long taskId);
          // 生成JSON报告
          String generateJson(Long taskId);
          // 按文件分组
          Map<String, List<Issue>> groupByFile(Long taskId);
          // 按严重程度分组
          Map<IssueSeverity, List<Issue>> groupBySeverity(Long taskId);
      }
      ```

      ## 交付要求
      - 所有文件写入 E:\Desktop\version\src\main\java\com\codereview\ 目录
      - 代码必须包含完整中文注释
      - 关键方法必须有异常处理逻辑（try-catch）
      - 调度器必须实现fail-mode降级策略
      - AST解析异常必须实现单文件隔离（不中断整个任务）
      - 完成后输出交付物摘要到 E:\Desktop\version\outputs\track-b-core-deliverable.md

    assigned_to: code-agent1-cron
    role: produce
    verified_by: verifier
    verify_prompt: |
      验证 Track B 交付物：
      1. 读取代码解析器，确认JavaParser和PythonParser都实现了SourceParser接口
      2. 读取RuleEngine.java，确认规则匹配逻辑完整
      3. 读取RuleLoader.java，确认fail-mode降级策略（log-and-skip/strict/warn）实现正确
      4. 读取IssueDetector.java，确认批量检测和部分结果返回逻辑
      5. 读取ScanScheduler.java，确认Redis队列、并发控制（最多10个）、超时重试（最多3次）实现正确
      6. 读取ReviewTaskService，确认createTask/startScan/updateStatus方法存在
      7. 确认AST解析异常兜底逻辑存在（单文件失败不中断任务）
      8. 读取ReportGenerator.java，确认HTML和JSON报告生成方法
      输出 PASS 或 FAIL 及具体问题列表。
    timeout_ms: 1800000

  - id: track-c-api
    title: Track C - REST接口 + JWT鉴权 + RBAC权限
    prompt: |
      在 E:\Desktop\version 目录下，实现代码审查系统的REST接口层。

      ## 前置要求
      必须先读取 Track A 创建的基础文件：
      - src/main/java/com/codereview/common/result/Result.java（统一响应）
      - src/main/java/com/codereview/common/enums/（枚举类）
      - src/main/java/com/codereview/entity/（实体类）
      - src/main/resources/application.yml（确认JWT密钥配置）

      ## 设计文档参考
      - E:\Desktop\version\outputs\worker4-api.md（接口设计第5-6章）
      - E:\Desktop\version\outputs\worker5-ops.md（异常处理第7章）

      ## 必须完成的内容

      ### 1. JWT认证（com.codereview.config）
      **JwtTokenProvider.java**：
      ```java
      @Component
      public class JwtTokenProvider {
          // Access Token: 2小时有效期，payload含userId/username/role/classId
          // Refresh Token: 7天有效期，payload含userId/type=jti
          String generateAccessToken(Long userId, String username, UserRole role, Long classId);
          String generateRefreshToken(Long userId);
          boolean validateToken(String token);
          Long getUserId(String token);
          UserRole getRole(String token);
          Long getClassId(String token);
      }
      ```

      **JwtAuthenticationFilter.java**（OncePerRequestFilter）：
      ```java
      // 从Authorization: Bearer <token>提取token
      // 验证token有效性（过期/签名/黑名单）
      // 注入Authentication到SecurityContext
      // 路径白名单：/api/auth/login, /api/auth/refresh, /actuator/**
      ```

      **SecurityConfig.java**：
      ```java
      @Configuration
      @EnableWebSecurity
      public class SecurityConfig {
          // 禁用CSRF（使用JWT Header认证，天然防御CSRF）
          // 放开白名单路径
          // 启用RBAC：SUPER_ADMIN/TEACHER/STUDENT三级权限
          // 数据隔离：根据JWT.classId注入行级过滤
      }
      ```

      **TokenBlacklistService.java**（Redis实现）：
      ```java
      // 登出时将refreshToken的jti加入Redis黑名单
      // 验证token时先查黑名单，存在则拒绝
      // 键格式：token:blacklist:{jti}，TTL=原始过期时间
      ```

      ### 2. 用户认证（com.codereview.service + controller）
      **AuthService.java**：
      ```java
      // 登录：验证用户名密码（bcrypt）-> 返回Access+Refresh双Token
      // 刷新：验证RefreshToken -> 返回新AccessToken
      // 登出：RefreshToken的jti加入黑名单
      ```

      **AuthController.java**（POST /api/auth/*）：
      ```java
      @RestController
      @RequestMapping("/api/auth")
      public class AuthController {
          postLogin(LoginRequest request);      // 公开
          postRefresh(RefreshRequest request);  // 已登录
          postLogout(HttpServletRequest request); // 已登录
      }
      ```

      **UserService.java**：
      ```java
      // 注册用户（bcrypt密码哈希）
      // 根据角色查询用户列表（带classId隔离）
      // 用户详情（含数据脱敏：手机号中间4位，邮箱@后隐藏）
      ```

      ### 3. RBAC权限控制（com.codereview.config）
      **PermissionAspect.java**（AOP切面）：
      ```java
      // 自定义@RequiresPermission注解
      // 切面拦截，检查UserRole是否满足要求
      // 不满足返回错误码1005（permission_denied）
      ```

      **DataScopeFilter.java**（数据隔离）：
      ```java
      // MyBatis-Plus QueryWrapper拦截器
      // STUDENT: 自动附加 classId = JWT.classId
