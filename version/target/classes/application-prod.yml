spring:
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/code_review}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:codereview}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
  actuator:
    endpoint:
      health:
        show-details: when_authorized

# 生产环境日志级别
logging:
  level:
    com.codereview: INFO
    org.springframework: WARN
    org.springframework.security: WARN
  file:
    name: /app/logs/code-review.log
    max-size: 100MB
    max-history: 30

# 生产环境配置
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

# JVM优化参数（通过环境变量或docker-compose设置）
# JAVA_OPTS: -Xms512m -Xmx2g -XX:+UseG1GC