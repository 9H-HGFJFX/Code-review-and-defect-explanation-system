# 代码审查与缺陷解释系统 - Docker Compose 一键部署（4 层架构版）
# 使用：docker compose up -d
# 关闭：docker compose down
#
# 服务清单（5 个容器）：
#   1. mysql   - MySQL 8.0（数据层）
#   2. redis   - Redis 7.0（数据层 + 缓存）
#   3. backend - Spring Boot 业务服务（业务层，内网）
#   4. gateway - Spring Cloud Gateway（网关层，内网）
#   5. nginx   - Nginx 1.24（接入层，对外）

version: "3.9"

services:
  # ============== 数据层 ==============
  mysql:
    image: mysql:8.0
    container_name: code-audit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: code_audit
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=512M
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./code-audit-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - code-audit-net

  redis:
    image: redis:7.0-alpine
    container_name: code-audit-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - code-audit-net

  # ============== 业务层 ==============
  backend:
    build:
      context: ./code-audit-server
      dockerfile: Dockerfile
    container_name: code-audit-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: code_audit
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: code-audit-prod-secret-please-rotate-2026
      # M3 API（不启用则 M3_ENABLED=false）
      M3_ENABLED: "false"
      M3_API_KEY: ""
      M3_BASE_URL: https://api.MiniMax.chat/v1
      M3_MODEL: MiniMax-M3
      TZ: Asia/Shanghai
    expose:
      - "8080"     # 仅内网，不映射主机
    networks:
      - code-audit-net

  # ============== 网关层 ==============
  gateway:
    build:
      context: ./code-audit-gateway
      dockerfile: Dockerfile
    container_name: code-audit-gateway
    restart: unless-stopped
    depends_on:
      - backend
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKEND_HOST: backend
      BACKEND_PORT: 8080
      JWT_SECRET: code-audit-prod-secret-please-rotate-2026   # 与 backend 一致
      TZ: Asia/Shanghai
    expose:
      - "8080"     # 仅内网，不映射主机
    networks:
      - code-audit-net

  # ============== 接入层 ==============
  nginx:
    image: nginx:1.24-alpine
    container_name: code-audit-nginx
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./code-audit-web/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - code-audit-net

volumes:
  mysql_data:
  redis_data:

networks:
  code-audit-net:
    driver: bridge
